<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lép Admin 🌱 - Pro Max</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Be Vietnam Pro', sans-serif; background-color: #f1f5f9; }
        .tab-active { color: #22c55e !important; border-bottom: 3px solid #22c55e; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .hidden { display: none !important; }
        .transition-active:active { transform: scale(0.95); }
    </style>
</head>
<body class="pb-24">

<div id="auth-overlay" class="fixed inset-0 z-[100] bg-white flex flex-col items-center justify-center p-6">
    <h1 class="text-3xl font-bold text-green-600 mb-2">Lép Admin 🌱</h1>
    <input type="password" id="pass-input" class="w-full max-w-xs p-4 bg-gray-100 rounded-2xl mb-4 text-center outline-none" placeholder="Mật mã là gì m?">
    <button onclick="checkAuth()" class="w-full max-w-xs bg-green-500 text-white py-4 rounded-2xl font-bold active:scale-95 transition-all">Vào Dashboard</button>
</div>

<div class="max-w-md mx-auto p-4 space-y-6">
    <div class="flex justify-between items-center py-2">
        <div>
            <h2 class="text-2xl font-bold text-gray-800">Chào Trang! 🌿</h2>
            <p class="text-gray-500 text-xs">Hôm nay "lùa" được bao nhiêu khách rồi?</p>
        </div>
        <button onclick="logout()" class="p-2 bg-white rounded-xl shadow-sm transition-active">🚪</button>
    </div>

    <div id="tab-stats" class="tab-content space-y-4">
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-white p-4 rounded-3xl card-shadow">
                <p class="text-[10px] text-gray-400 uppercase font-bold">Tổng Click</p>
                <p id="stat-total-clicks" class="text-2xl font-bold text-orange-500">0</p>
            </div>
            <div class="bg-white p-4 rounded-3xl card-shadow border-l-4 border-green-500">
                <p class="text-[10px] text-gray-400 uppercase font-bold">Thu nhập</p>
                <p id="stat-total-rev" class="text-2xl font-bold text-green-600">0đ</p>
            </div>
        </div>
        <div class="bg-white p-4 rounded-3xl card-shadow">
            <canvas id="mainChart" height="200"></canvas>
        </div>
    </div>

    <div id="tab-posts" class="tab-content hidden space-y-4">
        <div class="bg-white p-6 rounded-3xl card-shadow">
            <h3 class="font-bold text-gray-700 mb-4 text-sm">Lên bài mới</h3>
            <textarea id="post-content" rows="3" class="w-full p-4 bg-gray-50 rounded-2xl mb-2 outline-none" placeholder="Viết gì đó..."></textarea>
            <input id="post-img" class="w-full p-3 bg-gray-50 rounded-xl mb-3 outline-none" placeholder="Link ảnh">
            <button id="btn-save-post" onclick="savePost()" class="w-full bg-green-500 text-white py-3 rounded-xl font-bold transition-active">Đăng bài</button>
        </div>
        <div id="history-posts" class="space-y-3"></div>
    </div>

    <div id="tab-products" class="tab-content hidden space-y-4">
        <div class="bg-white p-5 rounded-3xl card-shadow border-t-4 border-green-500">
            <h3 id="form-title" class="font-bold text-gray-700 mb-3 text-sm">Thêm sản phẩm mới</h3>
            <input type="hidden" id="p-id">
            <div class="grid grid-cols-1 gap-2">
                <input id="p-name" class="p-3 bg-gray-50 rounded-xl outline-none" placeholder="Tên món đồ">
                <input id="p-link" class="p-3 bg-gray-50 rounded-xl outline-none" placeholder="Link Affiliate">
                <div class="grid grid-cols-2 gap-2">
                    <input id="p-sales" type="number" class="p-3 bg-gray-50 rounded-xl outline-none" placeholder="Số đơn">
                    <input id="p-revenue" type="number" class="p-3 bg-gray-50 rounded-xl outline-none" placeholder="Tiền về">
                </div>
                <button id="btn-save-product" onclick="saveProduct()" class="bg-green-500 text-white py-3 rounded-xl font-bold transition-active">Lưu lại</button>
                <button onclick="resetForm()" id="btn-cancel" class="hidden bg-gray-200 text-gray-600 py-2 rounded-xl text-xs transition-active">Hủy sửa</button>
            </div>
        </div>
        <div id="product-list" class="space-y-3"></div>
    </div>
</div>

<nav class="fixed bottom-0 left-0 right-0 glass border-t border-gray-100 p-2 flex justify-around items-center z-50">
    <button onclick="showTab('tab-stats', this)" class="nav-item tab-active flex flex-col items-center p-2">
        <span>📊</span><span class="text-[10px] font-bold">Thống kê</span>
    </button>
    <button onclick="showTab('tab-posts', this)" class="nav-item flex flex-col items-center p-2 text-gray-400">
        <span>📝</span><span class="text-[10px] font-bold">Đăng bài</span>
    </button>
    <button onclick="showTab('tab-products', this)" class="nav-item flex flex-col items-center p-2 text-gray-400">
        <span>🛒</span><span class="text-[10px] font-bold">Sản phẩm</span>
    </button>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // Khởi tạo Supabase
    const supabaseClient = supabase.createClient(
        "https://ebraxafpawypwmntoglw.supabase.co",
        "sb_publishable_DhXag1beuBobuA8n4580Eg_hPUZJ9P0"
    );

    let allProducts = [];
    let myChart;

    // KIỂM TRA ĐĂNG NHẬP
    async function checkAuth() {
        const email = "thuyeuchocomint@gmail.com"; // Email mày tạo ở bước 1
        const password = document.getElementById("pass-input").value;

        const { data, error } = await supabaseClient.auth.signInWithPassword({
            email: email,
            password: password,
        });

        if (error) {
            alert("Sai mật khẩu hoặc lỗi hệ thống m ơi!");
            console.error(error.message);
        } else {
            localStorage.setItem("admin_auth", "true"); // Giữ để check giao diện
            document.getElementById("auth-overlay").classList.add('hidden');
            loadData();
        }
    }

    // LOAD TẤT CẢ DỮ LIỆU
    async function loadData() {
        try {
            const [pRes, cRes] = await Promise.all([
                supabaseClient.from("products").select("*").order('created_at', { ascending: false }),
                supabaseClient.from("clicks").select("created_at")
            ]);

            if (pRes.error) throw pRes.error;
            allProducts = pRes.data || [];

            renderProducts(allProducts);
            updateDashboardStats(allProducts, cRes.data || []);
        } catch (err) {
            console.error(err);
            alert("Lỗi tải dữ liệu: " + err.message);
        }
    }

    // HIỂN THỊ DANH SÁCH SẢN PHẨM
    function renderProducts(list) {
        const listContainer = document.getElementById("product-list");
        if (list.length === 0) {
            listContainer.innerHTML = `<p class="text-gray-400 text-center py-10 text-xs">Chưa có món nào trong tiệm m ơi!</p>`;
            return;
        }

        listContainer.innerHTML = list.map(p => `
            <div class="bg-white p-4 rounded-3xl flex justify-between items-center shadow-sm border border-gray-50">
                <div class="flex-1 min-w-0 pr-4">
                    <p class="font-bold text-gray-800 text-sm truncate">${p.name}</p>
                    <div class="flex gap-2 mt-1">
                        <span class="text-[9px] bg-orange-50 text-orange-500 px-2 py-0.5 rounded-md font-bold">${p.actual_sales || 0} ĐƠN</span>
                        <span class="text-[9px] bg-green-50 text-green-600 px-2 py-0.5 rounded-md font-bold">${(p.revenue || 0).toLocaleString()}đ</span>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="editProduct('${p.id}')" class="p-2 bg-blue-50 text-blue-500 rounded-xl transition-active">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                        </svg>
                    </button>
                    <button onclick="deleteProduct('${p.id}')" class="p-2 bg-red-50 text-red-400 rounded-xl transition-active">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                </div>
            </div>
        `).join("");
    }

    // SỬA & XÓA SẢN PHẨM
    function editProduct(id) {
        const p = allProducts.find(x => x.id == id);
        if(!p) return;
        document.getElementById("p-id").value = p.id;
        document.getElementById("p-name").value = p.name;
        document.getElementById("p-link").value = p.link;
        document.getElementById("p-sales").value = p.actual_sales || 0;
        document.getElementById("p-revenue").value = p.revenue || 0;
        document.getElementById("form-title").innerText = "Đang sửa: " + p.name;
        document.getElementById("btn-cancel").classList.remove("hidden");
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function deleteProduct(id) {
        if(!confirm("Xóa thật hả m? Mất luôn đó!")) return;
        const { error } = await supabaseClient.from("products").delete().eq("id", id);
        if(!error) loadData();
    }

    async function saveProduct() {
        const id = document.getElementById("p-id").value;
        const btn = document.getElementById("btn-save-product");
        btn.innerText = "Đang lưu...";
        btn.disabled = true;

        const payload = {
            name: document.getElementById("p-name").value,
            link: document.getElementById("p-link").value,
            actual_sales: parseInt(document.getElementById("p-sales").value) || 0,
            revenue: parseFloat(document.getElementById("p-revenue").value) || 0
        };

        const res = id 
            ? await supabaseClient.from("products").update(payload).eq("id", id) 
            : await supabaseClient.from("products").insert([payload]);

        btn.innerText = "Lưu lại";
        btn.disabled = false;

        if(!res.error) { 
            resetForm(); 
            loadData(); 
            alert("Ngon lành!"); 
        } else {
            alert("Lỗi rồi: " + res.error.message);
        }
    }

    function resetForm() {
        document.getElementById("p-id").value = "";
        document.getElementById("p-name").value = "";
        document.getElementById("p-link").value = "";
        document.getElementById("p-sales").value = "";
        document.getElementById("p-revenue").value = "";
        document.getElementById("form-title").innerText = "Thêm sản phẩm mới";
        document.getElementById("btn-cancel").classList.add("hidden");
    }

    // THỐNG KÊ BIỂU ĐỒ
    function updateDashboardStats(products, clicks) {
        document.getElementById("stat-total-clicks").innerText = clicks.length;
        const totalRev = products.reduce((sum, p) => sum + (p.revenue || 0), 0);
        document.getElementById("stat-total-rev").innerText = totalRev.toLocaleString() + "đ";
        
        const dateMap = {};
        clicks.forEach(c => {
            const d = new Date(c.created_at).toLocaleDateString('vi-VN', {day:'2-digit', month:'2-digit'});
            dateMap[d] = (dateMap[d] || 0) + 1;
        });

        const labels = Object.keys(dateMap).sort().slice(-7);
        const values = labels.map(l => dateMap[l]);
        
        const ctx = document.getElementById('mainChart').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: { 
                labels: labels.length ? labels : ['Chưa có data'], 
                datasets: [{ 
                    data: values.length ? values : [0], 
                    borderColor: '#22c55e', 
                    tension: 0.4, 
                    fill: true, 
                    backgroundColor: 'rgba(34, 197, 94, 0.1)' 
                }] 
            },
            options: { 
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
            }
        });
    }

    // QUẢN LÝ BÀI VIẾT
    async function savePost() {
        const content = document.getElementById("post-content").value;
        const image_url = document.getElementById("post-img").value;
        if(!content) return alert("Nhập chữ vào m!");

        const btn = document.getElementById("btn-save-post");
        btn.innerText = "Đang đăng...";
        btn.disabled = true;

        const { error } = await supabaseClient.from("posts").insert([{ content, image_url }]);
        
        btn.innerText = "Đăng bài";
        btn.disabled = false;

        if(!error) {
            document.getElementById("post-content").value = "";
            document.getElementById("post-img").value = "";
            loadPosts();
            alert("Lên sóng!");
        }
    }

    async function loadPosts() {
        const { data } = await supabaseClient.from("posts").select("*").order('created_at', { ascending: false });
        document.getElementById("history-posts").innerHTML = (data || []).map(post => `
            <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-blue-400">
                <p class="text-xs text-gray-600 mb-1">${new Date(post.created_at).toLocaleString('vi-VN')}</p>
                <p class="text-sm text-gray-800 font-medium">${post.content}</p>
                ${post.image_url ? `<img src="${post.image_url}" class="mt-2 rounded-lg h-32 w-full object-cover border border-gray-100">` : ''}
            </div>
        `).join("");
    }

    // CHUYỂN TAB
    function showTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('tab-active', 'text-gray-400'));
        el.classList.add('tab-active');
        if(id === 'tab-posts') loadPosts();
        if(id === 'tab-stats') loadData();
    }

    async function logout() {
        await supabaseClient.auth.signOut();
        localStorage.removeItem("admin_auth");
        location.reload();
    }
    // TỰ ĐỘNG LOGIN NẾU ĐÃ CÓ TOKEN
    if (localStorage.getItem("admin_auth") === "true") { 
        document.getElementById("auth-overlay").classList.add('hidden'); 
        loadData(); 
    }
</script>
</body>
</html>
