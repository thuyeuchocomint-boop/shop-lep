<!DOCTYPE html>
<html>
<head>
  <title>Admin - Lép</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; }
    input, textarea { width: 100%; margin-bottom: 10px; padding: 10px; }
    button { background: #5ed3c6; color: white; border: none; padding: 10px; cursor: pointer; width: 100%; }
  </style>
</head>
<body>
  <h2>Quản lý Lép 🌱</h2>
  <section>
    <input id="new-avatar" placeholder="Link ảnh đại diện">
    <textarea id="new-bio" placeholder="Tiểu sử"></textarea>
    <input id="new-status" placeholder="Cảm nghĩ hôm nay">
    <input id="email_contact" placeholder="Gmail của m">
    <button onclick="saveAll()">Lưu Profile</button>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseClient = supabase.createClient("https://ebraxafpawypwmntoglw.supabase.co", "sb_publishable_DhXag1beuBobuA8n4580Eg_hPUZJ9P0");
    async function saveAll() {
      const s = {
        avatar: document.getElementById("new-avatar").value,
        bio: document.getElementById("new-bio").value,
        status: document.getElementById("new-status").value,
        email: document.getElementById("email_contact").value
      };
      for (const [key, value] of Object.entries(s)) {
        if(value) await supabaseClient.from("Settings").upsert({ key, value });
      }
      alert("Xong!");
    }
  </script>
</body>
