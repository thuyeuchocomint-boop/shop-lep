<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lép Control Center 🛠️</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-section { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        input, textarea, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #4CAF50; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .stats-box { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-card { background: #e8f5e9; padding: 15px; border-radius: 10px; flex: 1; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Lép Control Center 🌿</h2>
        
        <div class="stats-box">
            <div class="stat-card">Tổng Click: <span id="total-clicks">0</span></div>
            <div class="stat-card">Hoa hồng dự kiến: <span id="total-money">0đ</span></div>
        </div>

        <div class="admin-section">
            <h3>Đăng bài mới (Blog/Sản phẩm)</h3>
            <select id="post-type">
                <option value="blog">Đăng Blog/Status</option>
                <option value="product">Thêm link Affiliate mới</option>
            </select>
            <input type="text" id="post-title" placeholder="Tiêu đề (Tên sản phẩm hoặc tiêu đề blog)">
            <textarea id="post-body" placeholder="Nội dung/Review..."></textarea>
            <input type="text" id="post-image" placeholder="Dán link ảnh vào đây (URL)">
            <input type="text" id="post-link" placeholder="Dán link Affiliate (nếu là sản phẩm)">
            <button onclick="saveContent()">Đăng lên Web ngay</button>
        </div>

        <div class="admin-section">
            <h3>Chỉnh sửa giao diện Lép</h3>
            <label>Link Avatar của Lép hiện tại:</label>
            <input type="text" id="set-avatar" placeholder="Dán link ảnh con Lép mới">
            <button onclick="saveSettings()">Cập nhật Avatar & Social</button>
        </div>
    </div>
    <script type="module" src="admin.js"></script>
</body>
</html>
