<h2>Admin Login</h2>

<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">
<button onclick="login()">Login</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// Đổi tên biến từ 'supabase' thành 'supabaseClient' để tránh trùng với biến hệ thống
const supabaseClient = supabase.createClient(
  "https://ebraxafpawypwmntoglw.supabase.co",
  "sb_publishable_DhXag1beuBobuA8n4580Eg_hPUZJ9P0"
);

async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  console.log("Đang login với:", email);

  // Dùng đúng tên biến supabaseClient đã khai báo ở trên
  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email: email,
    password: password
  });

  console.log("DATA:", data);
  console.log("ERROR:", error);

  if(error){
    alert("Lỗi: " + error.message);
  } else {
    alert("Login thành công");
    window.location.href = "dashboard.html";
  }
}
</script>
